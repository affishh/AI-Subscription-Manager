<!DOCTYPE html>
<html>
<head>
    <title>AI Subscription Manager</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: #f4f6f9;
            margin: 0;
            padding: 0;
        }

        h1 {
            text-align: center;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 900px;
            margin: auto;
            padding: 20px;
        }

        .card {
            background: white;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 12px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            background: #4CAF50;
            color: white;
            padding: 10px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
        }

        button:hover {
            background: #45a049;
        }

        .logout {
            background: red;
        }

        #dashboard {
            background: #111;
            color: #0f0;
            padding: 10px;
            border-radius: 8px;
        }

        .chat-box {
            border: 1px solid #ccc;
            padding: 10px;
            height: 150px;
            overflow-y: auto;
            border-radius: 8px;
            background: #fafafa;
        }
    </style>
</head>

<body>

<h1>🚀 AI Subscription Manager</h1>

<div class="container">

    <!-- AUTH -->
    <div id="auth_section">

        <div class="card">
            <h3>Signup</h3>
            <input id="signup_email" placeholder="Email">
            <input id="signup_name" placeholder="Full Name">
            <input id="signup_password" type="password" placeholder="Password">
            <button onclick="signup()">Signup</button>
        </div>

        <div class="card">
            <h3>Login</h3>
            <input id="login_email" placeholder="Email">
            <input id="login_password" type="password" placeholder="Password">
            <button onclick="login()">Login</button>
        </div>

    </div>

    <!-- APP -->
    <div id="app_section" style="display:none;">

        <div class="card">
            <button class="logout" onclick="logout()">Logout</button>
        </div>

        <div class="card">
            <h3>Add Subscription</h3>
            <input id="tool" placeholder="Tool Name">
            <input id="cost" placeholder="Cost">
            <select id="cycle">
                <option value="monthly">Monthly</option>
                <option value="yearly">Yearly</option>
            </select>
            <button onclick="addSub()">Add</button>
        </div>

        <div class="card">
            <h3>Dashboard</h3>
            <button onclick="loadDashboard()">Load Dashboard</button>
            <pre id="dashboard"></pre>
        </div>

        <div class="card">
            <h3>Ask AI</h3>
            <div class="chat-box" id="chat_box"></div>
            <input id="query" placeholder="Ask something...">
            <button onclick="chat()">Send</button>
        </div>

    </div>

</div>

<script>

let token = "";

// SIGNUP
async function signup() {
    const res = await fetch("http://127.0.0.1:8000/signup/", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            email: signup_email.value,
            full_name: signup_name.value,
            password: signup_password.value
        })
    });

    alert(await res.text());
}

// LOGIN
async function login() {
    const res = await fetch("http://127.0.0.1:8000/login/", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            email: login_email.value,
            password: login_password.value
        })
    });

    const data = await res.json();

    if (data.access_token) {
        token = data.access_token;
        localStorage.setItem("token", token);

        auth_section.style.display = "none";
        app_section.style.display = "block";
    } else {
        alert("Login failed");
    }
}

// AUTO LOGIN
window.onload = function() {
    const savedToken = localStorage.getItem("token");
    if (savedToken) {
        token = savedToken;
        auth_section.style.display = "none";
        app_section.style.display = "block";
    }
};

// LOGOUT
function logout() {
    localStorage.removeItem("token");
    location.reload();
}

// ADD SUB
async function addSub() {
    const res = await fetch("http://127.0.0.1:8000/subscriptions/", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + token
        },
        body: JSON.stringify({
            tool_name: tool.value,
            cost: parseFloat(cost.value),
            billing_cycle: cycle.value
        })
    });

    alert(await res.text());
}

// DASHBOARD
async function loadDashboard() {
    const res = await fetch("http://127.0.0.1:8000/dashboard/", {
        headers: {
            "Authorization": "Bearer " + token
        }
    });

    const data = await res.json();
    dashboard.innerText = JSON.stringify(data, null, 2);
}

// CHAT
async function chat() {
    const message = query.value;

    chat_box.innerHTML += "<p><b>You:</b> " + message + "</p>";

    const res = await fetch("http://127.0.0.1:8000/chat/", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + token
        },
        body: JSON.stringify({ query: message })
    });

    const data = await res.json();

    chat_box.innerHTML += "<p><b>AI:</b> " + data.response + "</p>";
    chat_box.scrollTop = chat_box.scrollHeight;
}

</script>

</body>
</html>
